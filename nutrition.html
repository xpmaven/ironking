<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iron King — Nutrition</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');

  :root {
    --gold: #C9A84C;
    --gold-light: #E8C96A;
    --dark: #0D0D0D;
    --dark2: #161616;
    --dark3: #1F1F1F;
    --dark4: #2A2A2A;
    --text: #E8E4DC;
    --text-muted: #888;
    --red: #C0392B;
    --green: #27AE60;
    --blue: #2980B9;
    --orange: #E67E22;
    --protein-target: 170;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--dark);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    min-height: 100vh;
  }

  header {
    background: var(--dark2);
    border-bottom: 2px solid var(--gold);
    padding: 20px 24px;
    text-align: center;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.2rem;
    letter-spacing: 4px;
    color: var(--gold);
  }

  header p {
    font-size: 0.75rem;
    color: var(--text-muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 4px;
  }

  .container {
    max-width: 800px;
    margin: 0 auto;
    padding: 24px 16px;
  }

  /* DATE NAV */
  .date-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--dark2);
    border: 1px solid var(--dark4);
    border-radius: 12px;
    padding: 14px 20px;
    margin-bottom: 20px;
  }

  .date-nav button {
    background: none;
    border: none;
    color: var(--gold);
    font-size: 1.4rem;
    cursor: pointer;
    padding: 4px 12px;
    border-radius: 6px;
    transition: background 0.2s;
  }

  .date-nav button:hover { background: var(--dark4); }

  .date-display {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.4rem;
    letter-spacing: 3px;
    color: var(--text);
    text-align: center;
  }

  .date-display small {
    display: block;
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 0.7rem;
    color: var(--text-muted);
    letter-spacing: 1px;
    margin-top: 2px;
  }

  /* DAILY SUMMARY */
  .summary-card {
    background: var(--dark2);
    border-radius: 12px;
    border: 1px solid var(--dark4);
    padding: 20px;
    margin-bottom: 20px;
  }

  .summary-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1rem;
    letter-spacing: 3px;
    color: var(--text-muted);
    margin-bottom: 16px;
  }

  .macros-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 16px;
  }

  .macro-box {
    background: var(--dark3);
    border-radius: 10px;
    padding: 14px;
    text-align: center;
    border: 1px solid var(--dark4);
  }

  .macro-box.protein { border-top: 3px solid var(--gold); }
  .macro-box.calories { border-top: 3px solid var(--orange); }
  .macro-box.notes-box { border-top: 3px solid var(--blue); }

  .macro-value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    letter-spacing: 1px;
    line-height: 1;
  }

  .macro-box.protein .macro-value { color: var(--gold); }
  .macro-box.calories .macro-value { color: var(--orange); }

  .macro-label {
    font-size: 0.65rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-top: 4px;
  }

  .macro-target {
    font-size: 0.7rem;
    color: var(--text-muted);
    margin-top: 2px;
  }

  /* PROTEIN PROGRESS BAR */
  .progress-container {
    margin-top: 4px;
  }

  .progress-bar-bg {
    background: var(--dark4);
    border-radius: 20px;
    height: 12px;
    overflow: hidden;
    margin-bottom: 6px;
  }

  .progress-bar-fill {
    height: 100%;
    border-radius: 20px;
    transition: width 0.4s ease, background 0.4s ease;
    min-width: 0%;
    max-width: 100%;
  }

  .progress-bar-fill.under { background: var(--red); }
  .progress-bar-fill.close { background: var(--orange); }
  .progress-bar-fill.hit { background: var(--green); }

  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 0.7rem;
    color: var(--text-muted);
  }

  .progress-status {
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 1px;
  }

  .progress-status.under { color: var(--red); }
  .progress-status.close { color: var(--orange); }
  .progress-status.hit { color: var(--green); }

  /* DAILY NOTE */
  .daily-note-section {
    margin-top: 14px;
    border-top: 1px solid var(--dark4);
    padding-top: 14px;
  }

  .daily-note-section label {
    font-size: 0.7rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-muted);
    display: block;
    margin-bottom: 6px;
  }

  .daily-note-section textarea {
    width: 100%;
    background: var(--dark3);
    border: 1px solid var(--dark4);
    border-radius: 8px;
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 0.85rem;
    padding: 10px;
    resize: none;
    height: 60px;
    transition: border-color 0.2s;
  }

  .daily-note-section textarea:focus {
    outline: none;
    border-color: var(--gold);
  }

  /* ADD FOOD */
  .add-food-card {
    background: var(--dark2);
    border-radius: 12px;
    border: 1px solid var(--dark4);
    padding: 20px;
    margin-bottom: 20px;
  }

  .section-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1rem;
    letter-spacing: 3px;
    color: var(--text-muted);
    margin-bottom: 14px;
  }

  .meal-tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 14px;
    flex-wrap: wrap;
  }

  .meal-tab {
    background: var(--dark3);
    border: 1px solid var(--dark4);
    border-radius: 20px;
    color: var(--text-muted);
    font-size: 0.75rem;
    letter-spacing: 1px;
    padding: 6px 14px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'IBM Plex Sans', sans-serif;
  }

  .meal-tab.active, .meal-tab:hover {
    background: var(--gold);
    color: var(--dark);
    border-color: var(--gold);
    font-weight: 600;
  }

  .food-form {
    display: grid;
    grid-template-columns: 1fr auto auto auto;
    gap: 10px;
    align-items: end;
  }

  @media (max-width: 540px) {
    .food-form {
      grid-template-columns: 1fr 1fr;
    }
    .food-form .food-name-field {
      grid-column: 1 / -1;
    }
    .food-form .add-btn {
      grid-column: 1 / -1;
    }
  }

  .form-group {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .form-group label {
    font-size: 0.65rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .form-group input {
    background: var(--dark3);
    border: 1px solid var(--dark4);
    border-radius: 8px;
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 0.9rem;
    padding: 10px 12px;
    transition: border-color 0.2s;
    width: 100%;
  }

  .form-group input:focus {
    outline: none;
    border-color: var(--gold);
  }

  .add-btn {
    background: var(--gold);
    border: none;
    border-radius: 8px;
    color: var(--dark);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1rem;
    letter-spacing: 2px;
    padding: 10px 20px;
    cursor: pointer;
    transition: background 0.2s;
    white-space: nowrap;
    align-self: end;
  }

  .add-btn:hover { background: var(--gold-light); }

  /* FAVORITES */
  .favorites-section {
    margin-top: 14px;
    border-top: 1px solid var(--dark4);
    padding-top: 14px;
  }

  .favorites-title {
    font-size: 0.65rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 8px;
  }

  .favorites-list {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .fav-chip {
    background: var(--dark3);
    border: 1px solid var(--dark4);
    border-radius: 20px;
    padding: 5px 12px;
    font-size: 0.75rem;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .fav-chip:hover {
    border-color: var(--gold);
    color: var(--gold);
  }

  .fav-chip .fav-macros {
    color: var(--text-muted);
    font-size: 0.65rem;
  }

  .fav-chip .fav-delete {
    color: var(--text-muted);
    font-size: 0.7rem;
    margin-left: 2px;
  }

  .fav-chip .fav-delete:hover { color: var(--red); }

  /* FOOD LOG */
  .food-log-card {
    background: var(--dark2);
    border-radius: 12px;
    border: 1px solid var(--dark4);
    overflow: hidden;
    margin-bottom: 20px;
  }

  .meal-section {
    border-bottom: 1px solid var(--dark4);
  }

  .meal-section:last-child { border-bottom: none; }

  .meal-header {
    padding: 12px 20px;
    background: var(--dark3);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .meal-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 0.95rem;
    letter-spacing: 3px;
    color: var(--gold);
  }

  .meal-totals {
    font-size: 0.7rem;
    color: var(--text-muted);
    letter-spacing: 1px;
  }

  .food-item {
    padding: 12px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--dark4);
    transition: background 0.2s;
  }

  .food-item:last-child { border-bottom: none; }
  .food-item:hover { background: var(--dark3); }

  .food-item-name {
    font-size: 0.9rem;
    font-weight: 500;
  }

  .food-item-macros {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .food-macro {
    text-align: right;
  }

  .food-macro .value {
    font-size: 0.9rem;
    font-weight: 600;
  }

  .food-macro .value.protein-val { color: var(--gold); }
  .food-macro .value.cal-val { color: var(--orange); }

  .food-macro .unit {
    font-size: 0.6rem;
    color: var(--text-muted);
    letter-spacing: 1px;
    display: block;
  }

  .delete-food {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 1rem;
    padding: 4px 8px;
    border-radius: 4px;
    transition: all 0.2s;
    margin-left: 8px;
  }

  .delete-food:hover {
    color: var(--red);
    background: var(--dark4);
  }

  .empty-meal {
    padding: 16px 20px;
    font-size: 0.8rem;
    color: var(--text-muted);
    font-style: italic;
  }

  /* WEEKLY SUMMARY */
  .weekly-card {
    background: var(--dark2);
    border-radius: 12px;
    border: 1px solid var(--dark4);
    padding: 20px;
    margin-bottom: 20px;
  }

  .week-chart {
    display: flex;
    align-items: flex-end;
    gap: 8px;
    height: 100px;
    margin-top: 16px;
    padding-bottom: 24px;
    position: relative;
  }

  .week-bar-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    height: 100%;
    justify-content: flex-end;
    position: relative;
  }

  .week-bar {
    width: 100%;
    border-radius: 4px 4px 0 0;
    transition: height 0.4s ease;
    min-height: 4px;
  }

  .week-bar.under { background: var(--red); opacity: 0.7; }
  .week-bar.close { background: var(--orange); opacity: 0.8; }
  .week-bar.hit { background: var(--green); opacity: 0.85; }
  .week-bar.today { opacity: 1; box-shadow: 0 0 8px rgba(201,168,76,0.4); }
  .week-bar.empty { background: var(--dark4); }

  .week-bar-label {
    position: absolute;
    bottom: -20px;
    font-size: 0.6rem;
    color: var(--text-muted);
    letter-spacing: 1px;
    text-align: center;
    width: 100%;
  }

  .week-bar-value {
    position: absolute;
    top: -18px;
    font-size: 0.6rem;
    color: var(--text-muted);
    text-align: center;
    width: 100%;
  }

  .target-line {
    position: absolute;
    left: 0;
    right: 0;
    border-top: 1px dashed var(--gold);
    opacity: 0.4;
  }

  .target-line-label {
    position: absolute;
    right: 0;
    top: -14px;
    font-size: 0.6rem;
    color: var(--gold);
    opacity: 0.6;
  }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--green);
    color: white;
    padding: 12px 24px;
    border-radius: 8px;
    font-size: 0.85rem;
    font-weight: 600;
    letter-spacing: 1px;
    z-index: 999;
    transition: transform 0.3s ease;
    white-space: nowrap;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.warning { background: var(--orange); }

  /* SAVE FAV BUTTON */
  .save-fav-btn {
    background: none;
    border: 1px solid var(--dark4);
    border-radius: 8px;
    color: var(--text-muted);
    font-size: 0.75rem;
    padding: 10px 12px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    align-self: end;
  }

  .save-fav-btn:hover {
    border-color: var(--gold);
    color: var(--gold);
  }

</style>
</head>
<body>

<header>
  <h1>Iron King — Nutrition</h1>
  <p>Daily Fuel Tracker · Target: 170g Protein</p>
  <div style="margin-top:8px; display:flex; align-items:center; justify-content:center; gap:12px;">
    <span id="syncStatus" style="font-size:0.7rem; letter-spacing:1px;"></span>
    <button onclick="pullFromSheets(currentDateKey)" style="background:none; border:1px solid var(--dark4); border-radius:6px; color:var(--text-muted); font-size:0.7rem; padding:4px 10px; cursor:pointer; letter-spacing:1px;">⟳ Sync from Sheet</button>
  </div>
</header>

<div class="container">

  <!-- DATE NAV -->
  <div class="date-nav">
    <button onclick="changeDay(-1)">&#8592;</button>
    <div class="date-display">
      <span id="dateDisplay">—</span>
      <small id="dateRelative">—</small>
    </div>
    <button onclick="changeDay(1)">&#8594;</button>
  </div>

  <!-- DAILY SUMMARY -->
  <div class="summary-card">
    <div class="summary-title">Daily Summary</div>
    <div class="macros-row">
      <div class="macro-box protein">
        <div class="macro-value" id="totalProtein">0</div>
        <div class="macro-label">Protein (g)</div>
        <div class="macro-target">Target: 170g</div>
      </div>
      <div class="macro-box calories">
        <div class="macro-value" id="totalCalories">0</div>
        <div class="macro-label">Calories</div>
        <div class="macro-target">&nbsp;</div>
      </div>
      <div class="macro-box">
        <div class="macro-value" id="remainingProtein" style="color: var(--text-muted);">170</div>
        <div class="macro-label">Remaining (g)</div>
        <div class="macro-target">&nbsp;</div>
      </div>
    </div>

    <div class="progress-container">
      <div class="progress-bar-bg">
        <div class="progress-bar-fill under" id="proteinBar" style="width:0%"></div>
      </div>
      <div class="progress-label">
        <span id="progressPct">0%</span>
        <span class="progress-status under" id="progressStatus">0g to go</span>
      </div>
    </div>

    <div class="daily-note-section">
      <label>Daily Note — Energy, how you felt, what Michelle cooked</label>
      <textarea id="dailyNote" placeholder="e.g. Hit protein, felt strong, Michelle made chicken parm..." onchange="saveNote()"></textarea>
    </div>
  </div>

  <!-- ADD FOOD -->
  <div class="add-food-card">
    <div class="section-title">Log Food</div>

    <div class="meal-tabs">
      <button class="meal-tab active" onclick="selectMeal('Breakfast', this)">Breakfast</button>
      <button class="meal-tab" onclick="selectMeal('Pre-Workout', this)">Pre-Workout</button>
      <button class="meal-tab" onclick="selectMeal('Post-Workout', this)">Post-Workout</button>
      <button class="meal-tab" onclick="selectMeal('Lunch', this)">Lunch</button>
      <button class="meal-tab" onclick="selectMeal('Dinner', this)">Dinner</button>
      <button class="meal-tab" onclick="selectMeal('Snack', this)">Snack</button>
    </div>

    <div class="food-form">
      <div class="form-group food-name-field">
        <label>Food</label>
        <input type="text" id="foodName" placeholder="e.g. Chicken breast, eggs, protein shake..." />
      </div>
      <div class="form-group">
        <label>Protein (g)</label>
        <input type="number" id="foodProtein" placeholder="0" min="0" max="999" />
      </div>
      <div class="form-group">
        <label>Calories</label>
        <input type="number" id="foodCalories" placeholder="0" min="0" max="9999" />
      </div>
      <button class="save-fav-btn" onclick="saveFavorite()" title="Save as favorite">★ Fav</button>
      <button class="add-btn" onclick="addFood()">Add</button>
    </div>

    <div class="favorites-section" id="favoritesSection">
      <div class="favorites-title">⚡ Quick Add — Favorites</div>
      <div class="favorites-list" id="favoritesList">
        <span style="font-size:0.75rem; color: var(--text-muted); font-style:italic;">No favorites yet — add a food and tap ★ Fav to save it</span>
      </div>
    </div>
  </div>

  <!-- FOOD LOG -->
  <div class="food-log-card" id="foodLog">
    <!-- Rendered by JS -->
  </div>

  <!-- WEEKLY CHART -->
  <div class="weekly-card">
    <div class="section-title">This Week — Protein</div>
    <div class="week-chart" id="weekChart">
      <!-- Rendered by JS -->
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
  const PROTEIN_TARGET = 170;
  const MEALS = ['Breakfast', 'Pre-Workout', 'Post-Workout', 'Lunch', 'Dinner', 'Snack'];
  const SHEETS_URL = 'https://script.google.com/macros/s/AKfycbyluDQawYLPdRDd-n0HVB2AZ_JeWtTchFdcBQIV10LE0bwtGGLU1DOuAJVHedGMkM_kVw/exec';

  let currentDateKey = getTodayKey();
  let selectedMeal = 'Breakfast';
  let isSyncing = false;

  // ── SHEETS SYNC ──────────────────────────────────────────────
  async function pushToSheets(action, payload) {
    try {
      await fetch(SHEETS_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action, ...payload })
      });
    } catch(e) {
      console.warn('Sheets sync failed:', e);
    }
  }

  async function pullFromSheets(dateKey) {
    try {
      isSyncing = true;
      showSyncStatus('syncing');
      const res = await fetch(`${SHEETS_URL}?date=${dateKey}`);
      const json = await res.json();
      if (json.status === 'ok' && json.data.length > 0) {
        // Merge sheet data into localStorage
        const data = getData();
        if (!data[dateKey]) data[dateKey] = { meals: {}, note: '' };
        MEALS.forEach(m => { if (!data[dateKey].meals[m]) data[dateKey].meals[m] = []; });

        // Clear existing and rebuild from sheet
        MEALS.forEach(m => { data[dateKey].meals[m] = []; });
        json.data.forEach(row => {
          if (MEALS.includes(row.meal)) {
            data[dateKey].meals[row.meal].push({
              name: row.food,
              protein: parseFloat(row.protein) || 0,
              calories: parseFloat(row.calories) || 0,
              note: row.note || '',
              id: Date.now() + Math.random()
            });
          }
          if (row.note) data[dateKey].note = row.note;
        });

        localStorage.setItem('ik_nutrition', JSON.stringify(data));
        render();
      }
      showSyncStatus('synced');
    } catch(e) {
      showSyncStatus('offline');
      console.warn('Pull from Sheets failed:', e);
    } finally {
      isSyncing = false;
    }
  }

  function showSyncStatus(state) {
    const el = document.getElementById('syncStatus');
    if (!el) return;
    if (state === 'syncing') { el.textContent = '⟳ Syncing...'; el.style.color = 'var(--text-muted)'; }
    else if (state === 'synced') { el.textContent = '✓ Synced'; el.style.color = 'var(--green)'; setTimeout(() => { el.textContent = ''; }, 3000); }
    else if (state === 'offline') { el.textContent = '⚠ Offline'; el.style.color = 'var(--orange)'; }
  }

  function getTodayKey() {
    const d = new Date();
    return d.toISOString().split('T')[0];
  }

  function dateFromKey(key) {
    const [y, m, d] = key.split('-').map(Number);
    return new Date(y, m - 1, d);
  }

  function formatDateDisplay(key) {
    const d = dateFromKey(key);
    const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return `${days[d.getDay()]}, ${months[d.getMonth()]} ${d.getDate()}`;
  }

  function getRelativeLabel(key) {
    const today = getTodayKey();
    if (key === today) return 'Today';
    const d = dateFromKey(key);
    const t = dateFromKey(today);
    const diff = Math.round((d - t) / (1000 * 60 * 60 * 24));
    if (diff === -1) return 'Yesterday';
    if (diff === 1) return 'Tomorrow';
    if (diff < 0) return `${Math.abs(diff)} days ago`;
    return `In ${diff} days`;
  }

  function changeDay(delta) {
    const d = dateFromKey(currentDateKey);
    d.setDate(d.getDate() + delta);
    const newKey = d.toISOString().split('T')[0];
    if (newKey > getTodayKey()) return;
    currentDateKey = newKey;
    render();
    pullFromSheets(currentDateKey);
  }

  // DATA
  function getData() {
    try { return JSON.parse(localStorage.getItem('ik_nutrition') || '{}'); } catch(e) { return {}; }
  }

  function getDayData(key) {
    const data = getData();
    if (!data[key]) data[key] = { meals: {}, note: '' };
    MEALS.forEach(m => { if (!data[key].meals[m]) data[key].meals[m] = []; });
    return data[key];
  }

  function saveData(key, dayData) {
    const data = getData();
    data[key] = dayData;
    localStorage.setItem('ik_nutrition', JSON.stringify(data));
  }

  function getFavorites() {
    try { return JSON.parse(localStorage.getItem('ik_favorites') || '[]'); } catch(e) { return []; }
  }

  function saveFavorites(favs) {
    localStorage.setItem('ik_favorites', JSON.stringify(favs));
  }

  // ACTIONS
  function selectMeal(meal, el) {
    selectedMeal = meal;
    document.querySelectorAll('.meal-tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
  }

  function addFood() {
    const name = document.getElementById('foodName').value.trim();
    const protein = parseFloat(document.getElementById('foodProtein').value) || 0;
    const calories = parseFloat(document.getElementById('foodCalories').value) || 0;

    if (!name) { showToast('Enter a food name', 'warning'); return; }
    if (protein === 0 && calories === 0) { showToast('Enter protein or calories', 'warning'); return; }

    const dayData = getDayData(currentDateKey);
    const noteVal = document.getElementById('dailyNote').value || '';
    dayData.meals[selectedMeal].push({ name, protein, calories, id: Date.now() });
    saveData(currentDateKey, dayData);

    // Push to Google Sheets
    pushToSheets('addFood', {
      date: currentDateKey,
      meal: selectedMeal,
      food: name,
      protein,
      calories,
      note: noteVal
    });

    document.getElementById('foodName').value = '';
    document.getElementById('foodProtein').value = '';
    document.getElementById('foodCalories').value = '';

    showToast(`Added to ${selectedMeal} ✓`);
    render();
  }

  function deleteFood(meal, id, name, protein) {
    const dayData = getDayData(currentDateKey);
    dayData.meals[meal] = dayData.meals[meal].filter(f => f.id !== id);
    saveData(currentDateKey, dayData);

    // Push delete to Google Sheets
    pushToSheets('deleteFood', {
      date: currentDateKey,
      meal,
      food: name,
      protein
    });

    render();
  }

  function saveFavorite() {
    const name = document.getElementById('foodName').value.trim();
    const protein = parseFloat(document.getElementById('foodProtein').value) || 0;
    const calories = parseFloat(document.getElementById('foodCalories').value) || 0;

    if (!name) { showToast('Enter a food name first', 'warning'); return; }

    const favs = getFavorites();
    if (favs.find(f => f.name.toLowerCase() === name.toLowerCase())) {
      showToast('Already in favorites', 'warning'); return;
    }

    favs.push({ name, protein, calories, id: Date.now() });
    saveFavorites(favs);
    showToast(`★ ${name} saved to favorites`);
    renderFavorites();
  }

  function loadFavorite(fav) {
    document.getElementById('foodName').value = fav.name;
    document.getElementById('foodProtein').value = fav.protein || '';
    document.getElementById('foodCalories').value = fav.calories || '';
  }

  function deleteFavorite(id, e) {
    e.stopPropagation();
    const favs = getFavorites().filter(f => f.id !== id);
    saveFavorites(favs);
    renderFavorites();
  }

  function saveNote() {
    const note = document.getElementById('dailyNote').value;
    const dayData = getDayData(currentDateKey);
    dayData.note = note;
    saveData(currentDateKey, dayData);
    // Note saved locally — will sync on next food add
  }

  // RENDER
  function render() {
    document.getElementById('dateDisplay').textContent = formatDateDisplay(currentDateKey);
    document.getElementById('dateRelative').textContent = getRelativeLabel(currentDateKey);

    const dayData = getDayData(currentDateKey);
    const isToday = currentDateKey === getTodayKey();

    // Totals
    let totalProtein = 0, totalCalories = 0;
    MEALS.forEach(m => {
      dayData.meals[m].forEach(f => {
        totalProtein += f.protein;
        totalCalories += f.calories;
      });
    });

    totalProtein = Math.round(totalProtein * 10) / 10;
    totalCalories = Math.round(totalCalories);

    document.getElementById('totalProtein').textContent = totalProtein;
    document.getElementById('totalCalories').textContent = totalCalories;

    const remaining = Math.max(0, PROTEIN_TARGET - totalProtein);
    document.getElementById('remainingProtein').textContent = Math.round(remaining * 10) / 10;

    // Progress bar
    const pct = Math.min(100, (totalProtein / PROTEIN_TARGET) * 100);
    const bar = document.getElementById('proteinBar');
    const status = document.getElementById('progressStatus');
    const pctLabel = document.getElementById('progressPct');

    bar.style.width = pct + '%';
    pctLabel.textContent = Math.round(pct) + '%';

    if (pct >= 100) {
      bar.className = 'progress-bar-fill hit';
      status.className = 'progress-status hit';
      status.textContent = '✓ Target Hit';
    } else if (pct >= 80) {
      bar.className = 'progress-bar-fill close';
      status.className = 'progress-status close';
      status.textContent = `${Math.round(remaining)}g to go`;
    } else {
      bar.className = 'progress-bar-fill under';
      status.className = 'progress-status under';
      status.textContent = `${Math.round(remaining)}g to go`;
    }

    // Note
    document.getElementById('dailyNote').value = dayData.note || '';

    // Food log
    renderFoodLog(dayData);
    renderFavorites();
    renderWeekChart();
  }

  function renderFoodLog(dayData) {
    const log = document.getElementById('foodLog');
    let html = '';

    MEALS.forEach(meal => {
      const items = dayData.meals[meal] || [];
      const mealProtein = items.reduce((s, f) => s + f.protein, 0);
      const mealCal = items.reduce((s, f) => s + f.calories, 0);

      html += `<div class="meal-section">
        <div class="meal-header">
          <span class="meal-name">${meal}</span>
          <span class="meal-totals">${Math.round(mealProtein)}g protein · ${Math.round(mealCal)} cal</span>
        </div>`;

      if (items.length === 0) {
        html += `<div class="empty-meal">Nothing logged yet</div>`;
      } else {
        items.forEach(f => {
          html += `<div class="food-item">
            <span class="food-item-name">${escapeHtml(f.name)}</span>
            <div class="food-item-macros">
              <div class="food-macro">
                <span class="value protein-val">${f.protein}g</span>
                <span class="unit">protein</span>
              </div>
              <div class="food-macro">
                <span class="value cal-val">${f.calories}</span>
                <span class="unit">cal</span>
              </div>
              <button class="delete-food" onclick="deleteFood('${meal}', ${f.id}, '${f.name.replace(/'/g,"\\'")}', ${f.protein})">✕</button>
            </div>
          </div>`;
        });
      }

      html += `</div>`;
    });

    log.innerHTML = html;
  }

  function renderFavorites() {
    const favs = getFavorites();
    const list = document.getElementById('favoritesList');

    if (favs.length === 0) {
      list.innerHTML = `<span style="font-size:0.75rem; color: var(--text-muted); font-style:italic;">No favorites yet — add a food and tap ★ Fav to save it</span>`;
      return;
    }

    list.innerHTML = favs.map(f => `
      <div class="fav-chip" onclick="loadFavorite(${JSON.stringify(f).replace(/"/g, '&quot;')})">
        <span>${escapeHtml(f.name)}</span>
        <span class="fav-macros">${f.protein}g · ${f.calories}cal</span>
        <span class="fav-delete" onclick="deleteFavorite(${f.id}, event)">✕</span>
      </div>
    `).join('');
  }

  function renderWeekChart() {
    const chart = document.getElementById('weekChart');
    const today = dateFromKey(getTodayKey());
    const days = [];

    for (let i = 6; i >= 0; i--) {
      const d = new Date(today);
      d.setDate(d.getDate() - i);
      const key = d.toISOString().split('T')[0];
      const dayData = getDayData(key);
      let protein = 0;
      MEALS.forEach(m => { dayData.meals[m].forEach(f => protein += f.protein); });
      const labels = ['Su','Mo','Tu','We','Th','Fr','Sa'];
      days.push({ key, protein: Math.round(protein), label: labels[d.getDay()], isToday: key === getTodayKey() });
    }

    const maxProtein = Math.max(PROTEIN_TARGET * 1.2, ...days.map(d => d.protein));

    // Target line position
    const targetPct = (PROTEIN_TARGET / maxProtein) * 100;

    let html = `<div class="target-line" style="bottom: ${targetPct}%">
      <span class="target-line-label">170g</span>
    </div>`;

    days.forEach(d => {
      const heightPct = d.protein > 0 ? (d.protein / maxProtein) * 100 : 0;
      let barClass = 'empty';
      if (d.protein > 0) {
        if (d.protein >= PROTEIN_TARGET) barClass = 'hit';
        else if (d.protein >= PROTEIN_TARGET * 0.8) barClass = 'close';
        else barClass = 'under';
      }
      if (d.isToday) barClass += ' today';

      html += `<div class="week-bar-wrap">
        ${d.protein > 0 ? `<div class="week-bar-value">${d.protein}</div>` : ''}
        <div class="week-bar ${barClass}" style="height:${heightPct}%"></div>
        <div class="week-bar-label">${d.label}</div>
      </div>`;
    });

    chart.innerHTML = html;
  }

  function showToast(msg, type = 'success') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `toast${type === 'warning' ? ' warning' : ''} show`;
    setTimeout(() => { t.classList.remove('show'); }, 2500);
  }

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // Enter key to add food
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && (
      document.activeElement.id === 'foodName' ||
      document.activeElement.id === 'foodProtein' ||
      document.activeElement.id === 'foodCalories'
    )) addFood();
  });

  // INIT
  render();
  // Pull today's data from Sheets on load
  pullFromSheets(currentDateKey);
</script>
</body>
</html>
